name: Production CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Code Quality - ESLint
      run: npm run lint

    - name: Type Safety - TypeScript
      run: npm run type-check

    - name: Production Build
      run: npm run build
      
    # Future step: deploy to AWS/Vercel via action hooks here
